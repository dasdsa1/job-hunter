<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Hunter — Setup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 720px; margin: 0 auto; }

    header {
      margin-bottom: 2rem;
      border-bottom: 1px solid #1e293b;
      padding-bottom: 1.5rem;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #60a5fa;
      letter-spacing: -0.02em;
    }

    header p { color: #64748b; margin-top: 0.25rem; font-size: 0.9rem; }

    section {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.75rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    section h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 1rem;
    }

    .file-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .file-info {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      padding: 0.6rem 0.9rem;
      font-size: 0.85rem;
      color: #94a3b8;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .file-info.selected { color: #e2e8f0; border-color: #3b82f6; }
    .file-info.missing { border-color: #ef4444; color: #f87171; }

    .key-badge {
      font-size: 0.75rem;
      color: #64748b;
      margin-bottom: 0.25rem;
    }

    button {
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      border: none;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    button:hover { opacity: 0.85; }

    .btn-browse { background: #3b82f6; color: white; }
    .btn-add    { background: #10b981; color: white; }
    .btn-remove { background: #475569; color: #e2e8f0; padding: 0.5rem 0.65rem; }
    .btn-save   { background: #6366f1; color: white; padding: 0.75rem 2rem; font-size: 1rem; width: 100%; margin-top: 0.5rem; }

    .letter-item {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
      margin-bottom: 0.75rem;
    }

    .letter-item-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    input[type="text"] {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.375rem;
      padding: 0.45rem 0.7rem;
      color: #e2e8f0;
      font-size: 0.85rem;
      width: 100%;
      outline: none;
    }

    input[type="text"]:focus { border-color: #3b82f6; }

    .letter-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 0.5rem; }
    .label-small { font-size: 0.75rem; color: #64748b; margin-bottom: 0.25rem; }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: #10b981;
      color: white;
      padding: 0.75rem 1.25rem;
      border-radius: 0.5rem;
      font-size: 0.9rem;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .toast.show { opacity: 1; }
    .toast.error { background: #ef4444; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Job Hunter — File Setup</h1>
      <p>Select your CV and recommendation letters. These are saved locally and used for each application.</p>
    </header>

    <!-- CV Section -->
    <section>
      <h2>CV / Resume</h2>
      <div class="key-badge">Key: <code>cv</code></div>
      <div class="file-row">
        <div class="file-info" id="cv-display">No file selected</div>
        <button class="btn-browse" onclick="browseCV()">Browse…</button>
      </div>
    </section>

    <!-- Recommendation Letters Section -->
    <section>
      <h2>Recommendation Letters</h2>
      <div id="letters-list"></div>
      <button class="btn-add" onclick="addLetter()">+ Add Letter</button>
    </section>

    <button class="btn-save" onclick="saveConfig()">Save Configuration</button>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let config = { cv: null, letters: [] };

    async function init() {
      const res = await fetch('/api/config');
      config = await res.json();
      renderCV();
      renderLetters();
    }

    function renderCV() {
      const el = document.getElementById('cv-display');
      if (config.cv) {
        el.textContent = config.cv.path;
        el.className = 'file-info selected';
      } else {
        el.textContent = 'No file selected';
        el.className = 'file-info';
      }
    }

    function renderLetters() {
      const list = document.getElementById('letters-list');
      list.innerHTML = '';
      config.letters.forEach((letter, i) => {
        list.appendChild(buildLetterItem(letter, i));
      });
    }

    function buildLetterItem(letter, index) {
      const div = document.createElement('div');
      div.className = 'letter-item';
      div.innerHTML = `
        <div class="letter-item-header">
          <span style="flex:1;font-size:0.8rem;color:#64748b">Letter ${index + 1}</span>
          <button class="btn-remove" onclick="removeLetter(${index})">✕</button>
        </div>
        <div class="letter-fields">
          <div>
            <div class="label-small">Label (e.g. "Manager at Acme")</div>
            <input type="text" value="${esc(letter.label)}" onchange="updateLetter(${index}, 'label', this.value)" placeholder="Who wrote it">
          </div>
          <div>
            <div class="label-small">Key (used internally)</div>
            <input type="text" value="${esc(letter.key)}" onchange="updateLetter(${index}, 'key', this.value)" placeholder="e.g. john-smith">
          </div>
        </div>
        <div class="file-row">
          <div class="file-info ${letter.path ? 'selected' : ''}" id="letter-path-${index}">${letter.path || 'No file selected'}</div>
          <button class="btn-browse" onclick="browseLetter(${index})">Browse…</button>
        </div>
      `;
      return div;
    }

    async function browseCV() {
      const res = await fetch('/api/browse', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filter: 'Documents (*.pdf;*.docx)|*.pdf;*.docx' }),
      });
      const { files } = await res.json();
      if (!files.length) return;
      const filePath = files[0];
      const name = filePath.split(/[\\/]/).pop();
      const key = 'cv';
      config.cv = { key, label: name, path: filePath };
      renderCV();
    }

    async function browseLetter(index) {
      const res = await fetch('/api/browse', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filter: 'Documents (*.pdf;*.docx)|*.pdf;*.docx' }),
      });
      const { files } = await res.json();
      if (!files.length) return;
      config.letters[index].path = files[0];
      renderLetters();
    }

    function addLetter() {
      const idx = config.letters.length + 1;
      config.letters.push({ key: `letter-${idx}`, label: '', path: '' });
      renderLetters();
    }

    function removeLetter(index) {
      config.letters.splice(index, 1);
      renderLetters();
    }

    function updateLetter(index, field, value) {
      config.letters[index][field] = value;
    }

    async function saveConfig() {
      await fetch('/api/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(config),
      });
      showToast('Configuration saved!');
    }

    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show' + (isError ? ' error' : '');
      setTimeout(() => t.className = 'toast', 2500);
    }

    function esc(s) {
      return (s ?? '').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    init();
  </script>
</body>
</html>
