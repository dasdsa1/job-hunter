version: '3.8'

services:
  job-hunter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: job-hunter-worker

    volumes:
      # Mount your local JobHunter data dir so existing config/sessions/history are reused.
      # Windows path: %LocalAppData%\JobHunter  →  typically C:\Users\<you>\AppData\Local\JobHunter
      # Adjust the left side to your actual path:
      - ${JOBHUNTER_LOCAL_DATA:-./data}:/data

    environment:
      JOBHUNTER_HEADLESS: "true"
      JOBHUNTER_DATA_DIR: "/data"
      # Set your Gemini API key here (plaintext — DPAPI doesn't work in Linux containers).
      # Alternatively put it in .env next to this file: GEMINI_API_KEY=AIza...
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      # Search overrides (optional — ignored if /data/search.json exists)
      SEARCH_TITLE:    "${SEARCH_TITLE:-}"
      SEARCH_LOCATION: "${SEARCH_LOCATION:-Remote}"
      SEARCH_KEYWORDS: "${SEARCH_KEYWORDS:-}"
      SEARCH_MIN_SCORE: "${SEARCH_MIN_SCORE:-6}"
      SEARCH_MAX_JOBS:  "${SEARCH_MAX_JOBS:-20}"

    # Run once and exit (not a long-running service)
    restart: "no"
